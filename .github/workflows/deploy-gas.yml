name: Deploy Backend to Google Apps Script

on:
    push:
        branches:
            - main # 사용하는 기본 브랜치명으로 수정하세요
        paths:
            - 'backend/**' # backend 폴더 내의 파일이 수정되었을 때만 작동!

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Install Clasp
              run: npm install -g @google/clasp

            - name: Create Authentication File
              # GitHub Secrets에 저장해둔 토큰을 가상 서버의 홈 디렉토리에 파일로 생성해 줍니다.
              run: |
                  cat << 'EOF' > ~/.clasprc.json
                  ${{ secrets.CLASPRC_JSON }}
                  EOF

            - name: Push to Google Apps Script
              # backend 폴더만 콕 집어서 구글 서버로 강제 덮어쓰기(Force Push) 합니다.
              run: |
                  cd backend
                  clasp push -f
