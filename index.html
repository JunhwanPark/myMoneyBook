<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>부부 가계부</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
            rel="stylesheet"
        />

        <script src="https://accounts.google.com/gsi/client" async defer></script>
        <script src="https://cdn.jsdelivr.net/npm/jwt-decode/build/jwt-decode.min.js"></script>

        <style>
            ::-webkit-scrollbar {
                display: none;
            }
            .tab-content {
                display: none;
            }
            .tab-content.active {
                display: block;
            }
        </style>
    </head>
    <body class="bg-gray-100 text-gray-800 font-sans">
        <div
            id="login-screen"
            class="max-w-md mx-auto min-h-screen flex flex-col items-center justify-center bg-white p-6 shadow-lg"
        >
            <div class="bg-indigo-100 text-indigo-600 p-4 rounded-full mb-4">
                <span class="material-symbols-outlined text-5xl">account_balance_wallet</span>
            </div>
            <h1 class="text-2xl font-bold mb-2">부부 가계부</h1>
            <p class="text-gray-500 mb-8 text-center text-sm">
                허용된 사용자만 접근할 수 있습니다.<br />구글 계정으로 로그인해 주세요.
            </p>

            <div
                id="g_id_onload"
                data-client_id="423926198751-jor3vh0h0rn1d4l8jg2astfp253ktfqu.apps.googleusercontent.com"
                data-context="signin"
                data-ux_mode="popup"
                data-callback="handleCredentialResponse"
                data-auto_prompt="false"
            ></div>
            <div
                class="g_id_signin"
                data-type="standard"
                data-shape="rectangular"
                data-theme="outline"
                data-text="signin_with"
                data-size="large"
                data-logo_alignment="left"
            ></div>

            <p id="login-error" class="text-red-500 text-sm mt-4 hidden">
                등록되지 않은 계정입니다. 관리자에게 문의하세요.
            </p>
        </div>

        <div
            id="main-app"
            class="hidden max-w-md mx-auto bg-white min-h-screen relative shadow-lg flex flex-col overflow-hidden"
        >
            <header
                class="bg-indigo-600 text-white p-4 flex justify-between items-center shadow-md z-10"
            >
                <h1 class="text-xl font-bold" id="header-title">일간 내역</h1>
                <button
                    id="login-btn"
                    class="text-xs font-semibold bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded transition"
                >
                    구글 로그인
                </button>
            </header>

            <main class="flex-1 overflow-y-auto p-4 pb-24">
                <section id="view-daily" class="tab-content active">
                    <div class="flex justify-between items-end mb-4">
                        <h2 class="text-lg font-semibold">전체 내역</h2>
                        <span id="total-summary" class="text-sm text-gray-500">불러오는 중...</span>
                    </div>

                    <div id="daily-list-container">
                        <p class="text-center text-gray-500 py-10 text-sm">
                            데이터를 불러오는 중입니다...
                        </p>
                    </div>
                </section>

                <section id="view-monthly" class="tab-content">
                    <h2 class="text-lg font-semibold mb-4">월간 달력</h2>
                    <div
                        id="calendar"
                        class="bg-white p-2 rounded-lg shadow-sm border border-gray-100 text-[10px] sm:text-xs"
                    ></div>
                </section>

                <section id="view-stats" class="tab-content">
                    <div class="flex justify-between items-end mb-4">
                        <h2 class="text-lg font-semibold">지출 통계</h2>
                        <span id="chart-total-expense" class="text-sm text-gray-500">총 0원</span>
                    </div>
                    <div
                        class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 flex justify-center"
                    >
                        <div class="relative w-full max-w-[250px] aspect-square">
                            <canvas id="expenseChart"></canvas>
                        </div>
                    </div>
                    <p id="no-chart-data" class="text-center text-gray-500 mt-4 text-sm hidden">
                        지출 내역이 없습니다.
                    </p>
                </section>

                <section id="view-settings" class="tab-content">
                    <h2 class="text-lg font-semibold mb-4">설정</h2>
                    <ul class="divide-y divide-gray-200 border-t border-b border-gray-200">
                        <li
                            class="py-4 flex justify-between items-center cursor-pointer hover:bg-gray-50"
                        >
                            <div class="flex items-center gap-3">
                                <span class="material-symbols-outlined text-gray-500"
                                    >category</span
                                >
                                <span>카테고리 관리</span>
                            </div>
                            <span class="material-symbols-outlined text-gray-400"
                                >chevron_right</span
                            >
                        </li>
                    </ul>
                </section>
            </main>

            <button
                onclick="openAddModal()"
                class="absolute bottom-20 right-4 bg-indigo-600 text-white p-4 rounded-full shadow-lg hover:bg-indigo-700 transition transform hover:scale-105 z-20 flex items-center justify-center"
            >
                <span class="material-symbols-outlined">add</span>
            </button>

            <nav
                class="bg-white border-t flex justify-around items-center p-2 pb-safe absolute bottom-0 w-full z-10 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]"
            >
                <button
                    onclick="switchTab('daily', '일간 내역', this)"
                    class="nav-btn flex flex-col items-center p-2 text-indigo-600 w-1/4 transition"
                >
                    <span class="material-symbols-outlined">list_alt</span>
                    <span class="text-[10px] mt-1 font-medium">일간</span>
                </button>
                <button
                    onclick="switchTab('monthly', '월간 달력', this)"
                    class="nav-btn flex flex-col items-center p-2 text-gray-400 hover:text-indigo-400 w-1/4 transition"
                >
                    <span class="material-symbols-outlined">calendar_month</span>
                    <span class="text-[10px] mt-1 font-medium">월간</span>
                </button>
                <button
                    onclick="switchTab('stats', '월별 통계', this)"
                    class="nav-btn flex flex-col items-center p-2 text-gray-400 hover:text-indigo-400 w-1/4 transition"
                >
                    <span class="material-symbols-outlined">donut_large</span>
                    <span class="text-[10px] mt-1 font-medium">통계</span>
                </button>
                <button
                    onclick="switchTab('settings', '설정', this)"
                    class="nav-btn flex flex-col items-center p-2 text-gray-400 hover:text-indigo-400 w-1/4 transition"
                >
                    <span class="material-symbols-outlined">settings</span>
                    <span class="text-[10px] mt-1 font-medium">설정</span>
                </button>
            </nav>

            <div
                id="add-modal"
                class="hidden absolute inset-0 bg-black bg-opacity-40 z-50 flex items-end justify-center transition-opacity duration-300 opacity-0"
            >
                <div
                    id="modal-content"
                    class="bg-white w-full rounded-t-3xl p-6 transform transition-transform duration-300 translate-y-full shadow-2xl"
                >
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold">새 내역 추가</h3>
                        <button
                            onclick="closeAddModal()"
                            class="text-gray-400 hover:text-gray-700 p-1"
                        >
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </div>
                    <form id="add-form" class="space-y-4">
                        <div class="flex bg-gray-100 rounded-lg p-1">
                            <label class="flex-1 text-center cursor-pointer">
                                <input
                                    type="radio"
                                    name="type"
                                    value="expense"
                                    class="peer hidden"
                                    checked
                                />
                                <div
                                    class="peer-checked:bg-white peer-checked:shadow peer-checked:text-red-500 py-2 rounded-md text-sm font-semibold text-gray-500 transition"
                                >
                                    지출
                                </div>
                            </label>
                            <label class="flex-1 text-center cursor-pointer">
                                <input
                                    type="radio"
                                    name="type"
                                    value="income"
                                    class="peer hidden"
                                />
                                <div
                                    class="peer-checked:bg-white peer-checked:shadow peer-checked:text-blue-500 py-2 rounded-md text-sm font-semibold text-gray-500 transition"
                                >
                                    수입
                                </div>
                            </label>
                        </div>

                        <input
                            type="date"
                            id="input-date"
                            class="w-full border border-gray-300 p-3 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                            required
                        />

                        <select
                            id="input-category"
                            class="w-full border border-gray-300 p-3 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                        >
                            <option value="">카테고리 선택</option>
                            <option value="food">식비</option>
                            <option value="living">생활용품</option>
                            <option value="transport">교통비</option>
                        </select>

                        <input
                            type="number"
                            id="input-amount"
                            placeholder="금액 (원)"
                            class="w-full border border-gray-300 p-3 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                            required
                        />

                        <input
                            type="text"
                            id="input-memo"
                            placeholder="사용 내역 메모"
                            class="w-full border border-gray-300 p-3 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                        />

                        <input type="hidden" id="input-id" value="" />
                        <input type="hidden" id="input-action" value="create" />

                        <div class="flex gap-2 mt-2">
                            <button
                                type="button"
                                id="delete-btn"
                                onclick="deleteRecord()"
                                class="hidden w-1/3 bg-red-100 text-red-600 p-3 rounded-lg font-bold shadow-sm hover:bg-red-200 transition"
                            >
                                삭제
                            </button>
                            <button
                                type="button"
                                id="save-btn"
                                onclick="saveRecord()"
                                class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold shadow-md hover:bg-indigo-700 transition"
                            >
                                저장하기
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="app.js"></script>

        <div
            id="weekly-modal"
            class="hidden absolute inset-0 bg-black bg-opacity-40 z-40 flex items-end justify-center transition-opacity duration-300 opacity-0"
        >
            <div
                id="weekly-modal-content"
                class="bg-white w-full h-[75vh] rounded-t-3xl p-6 transform transition-transform duration-300 translate-y-full shadow-2xl flex flex-col"
            >
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h3 class="text-lg font-bold" id="weekly-title">주간 내역</h3>
                        <p class="text-xs text-gray-500" id="weekly-date-range"></p>
                    </div>
                    <button
                        onclick="closeWeeklyModal()"
                        class="text-gray-400 hover:text-gray-700 p-1"
                    >
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <div id="weekly-list-container" class="flex-1 overflow-y-auto pb-8"></div>
            </div>
        </div>
    </body>
</html>
